<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>🚀 Matrix Pro Max - Refresh Enabled</title>
    <style>
        :root {
            --bg-color: #03050a;
            --panel-bg: #0f111a;
            --text-color: white;
            --border-color: #ff3b3b;
            --card-bg: #1a1d29;
            --input-bg: #05070a;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --panel-bg: #ffffff;
            --text-color: #1a1d29;
            --border-color: #ff3b3b;
            --card-bg: #e4e6eb;
            --input-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-color); min-height: 100vh; padding: 15px; overflow: hidden; color: var(--text-color); transition: background 0.3s; }
        
        .main-container { display: flex; height: 98vh; gap: 0; }
        
        .redmi-grid { 
            display: flex; flex-wrap: wrap; gap: 15px; flex: 1; 
            overflow-y: auto; align-content: flex-start; padding: 10px;
        }

        .control-panel { 
            width: 320px; min-width: 200px; max-width: 600px;
            background: var(--panel-bg); border-radius: 20px; 
            padding: 20px; border: 1px solid var(--border-color); 
            overflow-y: auto; position: relative;
            display: flex; flex-direction: column;
        }

        .resizer {
            width: 10px; cursor: ew-resize; height: 100%;
            position: absolute; left: 0; top: 0; background: transparent;
        }
        .resizer:hover { background: rgba(255, 59, 59, 0.1); }

        .panel-header { color: #ff3b3b; text-align: center; font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .theme-toggle {
            background: #333; color: white; border: none; padding: 5px 10px; 
            border-radius: 20px; cursor: pointer; font-size: 10px; margin-bottom: 15px; align-self: center;
        }

        .url-row { 
            background: var(--card-bg); border-radius: 15px; padding: 12px; 
            border: 1px solid #333; margin-bottom: 15px;
        }

        .device-label { color: #00ffcc; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: block; }

        .url-input { 
            width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid #444; 
            color: var(--text-color); border-radius: 6px; font-size: 11px; margin-bottom: 10px;
        }

        .dim-inputs { display: flex; gap: 5px; margin-bottom: 10px; }
        .dim-inputs input { 
            width: 50%; padding: 8px; background: #000; border: 1px solid #444; 
            color: #00ffcc; border-radius: 6px; font-size: 12px; text-align: center;
        }

        .redmi-frame { 
            background: #fff; border-radius: 20px; overflow: hidden; 
            border: 2px solid #333; position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        iframe { border: none; width: 100%; height: 100%; display: block; background: white; }

        button { cursor: pointer; font-weight: bold; border-radius: 8px; border: none; transition: 0.2s; font-size: 11px; }
        .apply-btn { background: #00ffcc; color: #000; padding: 10px; width: 100%; margin-bottom: 8px; text-transform: uppercase; }
        
        .action-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .load-btn { flex: 2; background: #ff3b3b; color: white; padding: 8px; }
        .refresh-btn { flex: 1.2; background: #2ecc71; color: white; padding: 8px; }
        .del-btn { flex: 1; background: #333; color: #ff4444; padding: 8px; }

        .add-btn { width: 100%; padding: 15px; background: #ff3b3b; color: white; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="redmi-grid" id="redmiGrid"></div>
    
    <div class="control-panel" id="sidePanel">
        <div class="resizer" id="dragHandle"></div>
        <h1 class="panel-header">🚀 MATRIX V7 PRO</h1>
        
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌓 SWITCH LIGHT MODE</button>
        
        <div id="urlList"></div>
        
        <button class="add-btn" onclick="addDevice()">➕ ADD NEW DEVICE</button>
        <button onclick="clearAllData()" style="width: 100%; background: none; border: none; color: #888; font-size: 10px; cursor: pointer; margin-top: 10px;">Reset All Data</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'matrix_fixed_v7';
    let devices = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        { id: "dev_" + Date.now(), url: '', width: 350, height: 650 }
    ];

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        document.getElementById('themeBtn').innerText = isLight ? "🌞 SWITCH DARK MODE" : "🌓 SWITCH LIGHT MODE";
        localStorage.setItem('matrix_theme', isLight ? 'light' : 'dark');
    }

    // Resizer logic
    const panel = document.getElementById('sidePanel');
    const handle = document.getElementById('dragHandle');
    let isResizing = false;

    handle.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'ew-resize';
        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
            document.removeEventListener('mousemove', handleMouseMove);
        });
    });

    function handleMouseMove(e) {
        if (!isResizing) return;
        const newWidth = window.innerWidth - e.clientX;
        if (newWidth > 150 && newWidth < 800) {
            panel.style.width = newWidth + 'px';
        }
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(devices)); }

    function initGrid() {
        if(localStorage.getItem('matrix_theme') === 'light') toggleTheme();
        const grid = document.getElementById('redmiGrid');
        grid.innerHTML = '';
        devices.forEach(dev => createBoxInDOM(dev));
        renderControlPanel();
    }

    function createBoxInDOM(dev) {
        const grid = document.getElementById('redmiGrid');
        const col = document.createElement('div');
        col.className = 'redmi-col';
        col.id = `col-${dev.id}`;
        col.style.width = dev.width + 'px';
        col.style.flex = "0 0 auto";
        
        col.innerHTML = `
            <div class="redmi-frame" id="frame-${dev.id}" style="height: ${dev.height}px;">
                <iframe id="iframe-${dev.id}" src="${dev.url || 'about:blank'}" allow="clipboard-write"></iframe>
            </div>
        `;
        grid.appendChild(col);
    }

    function renderControlPanel() {
        const list = document.getElementById('urlList');
        list.innerHTML = '';
        
        devices.forEach((dev, index) => {
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <span class="device-label">📱 DEVICE #${index + 1}</span>
                <input type="text" class="url-input" id="in-url-${dev.id}" placeholder="URL यहाँ डालें..." value="${dev.url}">
                
                <div class="dim-inputs">
                    <input type="number" id="w-${dev.id}" value="${dev.width}" title="Width">
                    <input type="number" id="h-${dev.id}" value="${dev.height}" title="Height">
                </div>

                <button class="apply-btn" onclick="updateDeviceConfig('${dev.id}')">Apply Settings</button>
                <div class="action-group">
                    <button class="load-btn" onclick="loadUrlOnly('${dev.id}')">⚡ Load</button>
                    <button class="refresh-btn" onclick="refreshBox('${dev.id}')">🔄 Refresh</button>
                    <button class="del-btn" onclick="removeDevice('${dev.id}')">Del</button>
                </div>
            `;
            list.appendChild(row);
        });
    }

    // नई Refresh फंक्शनैलिटी
    function refreshBox(id) {
        const iframe = document.getElementById(`iframe-${id}`);
        if (iframe) {
            const currentSrc = iframe.src;
            iframe.src = 'about:blank'; // फ्लैश इफेक्ट के लिए
            setTimeout(() => {
                iframe.src = currentSrc;
            }, 100);
        }
    }

    function updateDeviceConfig(id) {
        const newW = document.getElementById(`w-${id}`).value;
        const newH = document.getElementById(`h-${id}`).value;
        const dev = devices.find(d => d.id === id);
        if(dev) {
            dev.width = parseInt(newW);
            dev.height = parseInt(newH);
            save();
            const col = document.getElementById(`col-${id}`);
            const frame = document.getElementById(`frame-${id}`);
            if(col) col.style.width = newW + 'px';
            if(frame) frame.style.height = newH + 'px';
        }
    }

    function loadUrlOnly(id) {
        const urlInput = document.getElementById(`in-url-${id}`).value.trim();
        let finalUrl = urlInput;
        if(finalUrl && !/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
        const dev = devices.find(d => d.id === id);
        if(dev) {
            dev.url = finalUrl;
            save();
            document.getElementById(`iframe-${id}`).src = finalUrl || 'about:blank';
        }
    }

    function addDevice() {
        const newDev = { id: "dev_" + Date.now(), url: '', width: 350, height: 650 };
        devices.push(newDev);
        save();
        createBoxInDOM(newDev);
        renderControlPanel();
    }

    function removeDevice(id) {
        if(confirm("Delete this box?")) {
            devices = devices.filter(d => d.id !== id);
            save();
            const el = document.getElementById(`col-${id}`);
            if(el) el.remove();
            renderControlPanel();
        }
    }

    function clearAllData() {
        if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); }
    }

    window.onload = initGrid;
</script>

</body>
</html>
