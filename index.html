<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>🚀 Matrix Pro Max - Fixed View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #03050a; min-height: 100vh; padding: 15px; overflow: hidden; color: white; }
        
        .main-container { display: flex; height: 98vh; gap: 15px; }
        
        /* Grid Area */
        .redmi-grid { 
            display: flex; flex-wrap: wrap; gap: 15px; flex: 1; 
            overflow-y: auto; align-content: flex-start; padding: 10px;
        }

        .redmi-col { 
            flex: 0 0 auto; 
            transition: width 0.3s ease;
        }
        
        .redmi-frame { 
            background: #fff; border-radius: 20px; overflow: hidden; 
            border: 2px solid #333; position: relative;
            transition: height 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Iframe takes full space of the box */
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            display: block; 
            background: white; 
        }

        /* Control Panel */
        .control-panel { 
            width: 320px; background: #0f111a; border-radius: 20px; 
            padding: 20px; border: 1px solid #ff3b3b; overflow-y: auto;
        }

        .panel-header { color: #ff3b3b; text-align: center; font-size: 1.2rem; font-weight: 800; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }

        .url-row { 
            background: #1a1d29; border-radius: 15px; padding: 12px; 
            border: 1px solid #333; margin-bottom: 15px;
        }

        .device-label { color: #00ffcc; font-size: 11px; font-weight: bold; margin-bottom: 8px; display: block; }

        .url-input { 
            width: 100%; padding: 8px; background: #05070a; border: 1px solid #444; 
            color: white; border-radius: 6px; font-size: 11px; margin-bottom: 10px;
        }

        .dim-inputs { display: flex; gap: 5px; margin-bottom: 10px; }
        .dim-inputs input { 
            width: 50%; padding: 8px; background: #000; border: 1px solid #444; 
            color: #00ffcc; border-radius: 6px; font-size: 12px; text-align: center;
        }

        button { cursor: pointer; font-weight: bold; border-radius: 8px; border: none; transition: 0.2s; font-size: 11px; }
        
        .apply-btn { background: #00ffcc; color: #000; padding: 10px; width: 100%; margin-bottom: 8px; text-transform: uppercase; }
        .apply-btn:hover { background: #00d4aa; box-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

        .load-btn { flex: 2; background: #ff3b3b; color: white; padding: 8px; }
        .del-btn { flex: 1; background: #333; color: #ff4444; padding: 8px; }

        .add-btn { 
            width: 100%; padding: 15px; background: #ff3b3b; color: white; 
            font-size: 13px; margin-bottom: 10px; text-transform: uppercase;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #ff3b3b; border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="redmi-grid" id="redmiGrid"></div>
    
    <div class="control-panel">
        <h1 class="panel-header">🚀 MATRIX V7 PRO</h1>
        
        <div id="urlList"></div>
        
        <button class="add-btn" onclick="addDevice()">➕ ADD NEW DEVICE</button>
        <button onclick="clearAllData()" style="width: 100%; background: none; border: none; color: #444; font-size: 10px; cursor: pointer; margin-top: 10px;">Reset All Data</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'matrix_fixed_v7';
    let devices = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
        { id: "dev_" + Date.now(), url: '', width: 350, height: 650 }
    ];

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(devices)); }

    function initGrid() {
        const grid = document.getElementById('redmiGrid');
        grid.innerHTML = '';
        devices.forEach(dev => createBoxInDOM(dev));
        renderControlPanel();
    }

    function createBoxInDOM(dev) {
        const grid = document.getElementById('redmiGrid');
        const col = document.createElement('div');
        col.className = 'redmi-col';
        col.id = `col-${dev.id}`;
        col.style.width = dev.width + 'px';
        
        col.innerHTML = `
            <div class="redmi-frame" id="frame-${dev.id}" style="height: ${dev.height}px;">
                <iframe id="iframe-${dev.id}" src="${dev.url || 'about:blank'}" allow="clipboard-write"></iframe>
            </div>
        `;
        grid.appendChild(col);
    }

    function renderControlPanel() {
        const list = document.getElementById('urlList');
        list.innerHTML = '';
        
        devices.forEach((dev, index) => {
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <span class="device-label">📱 DEVICE #${index + 1}</span>
                <input type="text" class="url-input" id="in-url-${dev.id}" placeholder="URL यहाँ पेस्ट करें..." value="${dev.url}">
                
                <div class="dim-inputs">
                    <input type="number" id="w-${dev.id}" value="${dev.width}" placeholder="Width">
                    <input type="number" id="h-${dev.id}" value="${dev.height}" placeholder="Height">
                </div>

                <button class="apply-btn" onclick="updateDeviceConfig('${dev.id}')">Apply Settings</button>
                <div style="display: flex; gap: 5px;">
                    <button class="load-btn" onclick="loadUrlOnly('${dev.id}')">⚡ Load Web</button>
                    <button class="del-btn" onclick="removeDevice('${dev.id}')">Delete</button>
                </div>
            `;
            list.appendChild(row);
        });
    }

    function updateDeviceConfig(id) {
        const newW = document.getElementById(`w-${id}`).value;
        const newH = document.getElementById(`h-${id}`).value;
        
        const dev = devices.find(d => d.id === id);
        if(dev) {
            dev.width = parseInt(newW);
            dev.height = parseInt(newH);
            save();

            const col = document.getElementById(`col-${id}`);
            const frame = document.getElementById(`frame-${id}`);
            
            if(col) col.style.width = newW + 'px';
            if(frame) frame.style.height = newH + 'px';
        }
    }

    function loadUrlOnly(id) {
        const urlInput = document.getElementById(`in-url-${id}`).value.trim();
        let finalUrl = urlInput;
        if(finalUrl && !/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
        
        const dev = devices.find(d => d.id === id);
        dev.url = finalUrl;
        save();

        const iframe = document.getElementById(`iframe-${id}`);
        iframe.src = finalUrl || 'about:blank';
    }

    function addDevice() {
        const newDev = { id: "dev_" + Date.now(), url: '', width: 350, height: 650 };
        devices.push(newDev);
        save();
        createBoxInDOM(newDev);
        renderControlPanel();
    }

    function removeDevice(id) {
        if(confirm("Delete this box?")) {
            devices = devices.filter(d => d.id !== id);
            save();
            document.getElementById(`col-${id}`).remove();
            renderControlPanel();
        }
    }

    function clearAllData() {
        if(confirm("Clear everything?")) { localStorage.clear(); location.reload(); }
    }

    window.onload = initGrid;
</script>

</body>
</html>
