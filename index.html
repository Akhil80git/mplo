<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>🚀 Matrix Pro Max - Anti-Conflict Edition</title>
    <style>
        /* CSS पहले जैसा ही रहेगा, सिर्फ फंक्शनलिटी में बदलाव है */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #03050a; min-height: 100vh; padding: 15px; overflow-x: auto; color: white; }
        .dashboard { display: flex; gap: 15px; align-items: flex-start; }
        .redmi-grid { display: flex; flex-wrap: wrap; gap: 10px; flex: 1; }
        .redmi-col { flex: 0 0 auto; position: relative; }
        .redmi-frame { background: #fff; border-radius: 20px; overflow: hidden; border: 2px solid #ff3b3b; position: relative; }
        .scale-wrapper { width: 375px; transform-origin: top left; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
        .control-panel { width: 300px; background: rgba(15, 15, 25, 0.98); border-radius: 20px; padding: 15px; border: 1px solid #ff3b3b; position: sticky; top: 10px; max-height: 95vh; overflow-y: auto; }
        .url-row { background: #111; border-radius: 12px; padding: 12px; border: 1px solid #222; margin-bottom: 12px; }
        .url-input { width: 100%; padding: 8px; background: #1e1e2a; border: 1px solid #444; color: white; border-radius: 6px; font-size: 11px; margin-bottom: 8px; }
        .dim-inputs { display: flex; gap: 5px; margin-bottom: 8px; }
        .dim-inputs input { width: 50%; padding: 6px; background: #000; border: 1px solid #ff3b3b; color: #fff; border-radius: 4px; font-size: 11px; }
        button { cursor: pointer; font-weight: 600; border-radius: 6px; border: none; font-size: 11px; padding: 7px; }
        .load-btn { background: #ff3b3b; color: white; width: 70%; }
        .del-btn { background: #222; color: #ff6666; width: 28%; }
        .add-btn { width: 100%; padding: 12px; background: #00ffcc; color: #000; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="redmi-grid" id="redmiGrid"></div>
    <div class="control-panel">
        <h2 style="color:#ff3b3b; text-align:center; margin-bottom:15px;">🚀 MATRIX PRO MAX</h2>
        <div id="urlList"></div>
        <button class="add-btn" onclick="addDevice()">➕ ADD NEW DEVICE</button>
        <button onclick="loadAll()" style="width:100%; background:#444; color:white; margin-bottom:5px;">⚡ REFRESH ALL</button>
        <button onclick="clearAll()" style="width:100%; background:transparent; color:#ff6666; border:1px solid #444;">🧹 CLEAR STORAGE</button>
    </div>
</div>

<script>
    let devices = JSON.parse(localStorage.getItem('matrix_session_v4')) || [
        { id: "dev1", name: "Device 1", url: '', width: 300, height: 600 }
    ];

    function save() { localStorage.setItem('matrix_session_v4', JSON.stringify(devices)); }

    function render() {
        const grid = document.getElementById('redmiGrid');
        const list = document.getElementById('urlList');
        grid.innerHTML = ''; list.innerHTML = '';

        devices.forEach((dev, index) => {
            // Unique URL generation to trick the browser session
            let finalUrl = dev.url;
            if(finalUrl && finalUrl !== 'about:blank') {
                const separator = finalUrl.includes('?') ? '&' : '?';
                finalUrl = `${finalUrl}${separator}matrixId=${dev.id}`;
            }

            // Grid Layout
            const col = document.createElement('div');
            col.className = 'redmi-col';
            col.style.width = dev.width + 'px';
            col.innerHTML = `
                <div class="redmi-frame" id="frame-${dev.id}" style="height: ${dev.height}px;">
                    <div class="scale-wrapper" id="scale-${dev.id}">
                        <iframe id="iframe-${dev.id}" src="${finalUrl || 'about:blank'}" allow="clipboard-write"></iframe>
                    </div>
                </div>
            `;
            grid.appendChild(col);

            // Control Row
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <label style="color:#00ffcc; font-size:10px;">BOX ID: ${dev.id}</label>
                <input type="text" class="url-input" id="in-url-${dev.id}" placeholder="URL यहाँ डालें..." value="${dev.url}" oninput="updateData('${dev.id}', 'url', this.value)">
                <div class="dim-inputs">
                    <input type="number" value="${dev.width}" oninput="updateData('${dev.id}', 'width', this.value)" placeholder="W">
                    <input type="number" value="${dev.height}" oninput="updateData('${dev.id}', 'height', this.value)" placeholder="H">
                </div>
                <div style="display:flex; gap:5px;">
                    <button class="load-btn" onclick="loadSingle('${dev.id}')">LOGIN/LOAD</button>
                    <button class="del-btn" onclick="removeDevice('${dev.id}')">DEL</button>
                </div>
            `;
            list.appendChild(row);
        });
        setTimeout(applyScaling, 100);
    }

    function updateData(id, key, val) {
        const dev = devices.find(d => d.id === id);
        if(dev) { dev[key] = val; save(); }
    }

    function loadSingle(id) {
        const dev = devices.find(d => d.id === id);
        const iframe = document.getElementById(`iframe-${id}`);
        let inputUrl = document.getElementById(`in-url-${id}`).value.trim();
        
        if(inputUrl && !/^https?:\/\//i.test(inputUrl)) inputUrl = 'https://' + inputUrl;
        dev.url = inputUrl;
        save();
        render(); // Re-render to apply unique matrixId in URL
    }

    function applyScaling() {
        devices.forEach(dev => {
            const frame = document.getElementById(`frame-${dev.id}`);
            const wrapper = document.getElementById(`scale-${dev.id}`);
            if (frame && wrapper) {
                const scale = frame.clientWidth / 375;
                wrapper.style.transform = `scale(${scale})`;
                wrapper.style.height = (frame.clientHeight / scale) + 'px';
            }
        });
    }

    function addDevice() {
        const newId = "dev" + Date.now();
        devices.push({ id: newId, url: '', width: 300, height: 600 });
        save(); render();
    }

    function removeDevice(id) { devices = devices.filter(d => d.id !== id); save(); render(); }
    function loadAll() { render(); }
    function clearAll() { if(confirm("सब डेटा साफ़ करें?")) { localStorage.clear(); location.reload(); } }

    window.onload = render;
    window.onresize = applyScaling;
    setInterval(applyScaling, 2000);
</script>
</body>
</html>
