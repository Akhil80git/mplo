<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>🚀 Matrix V10 - Strict Mobile Mask</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #03050a; height: 100vh; padding: 15px; overflow: hidden; color: white; }
        
        .main-container { display: flex; height: 95vh; gap: 20px; }
        
        .emulator-grid { 
            display: flex; flex-wrap: wrap; gap: 30px; flex: 1; 
            overflow-y: auto; align-content: flex-start; padding: 20px;
        }

        /* असली मोबाइल का ढांचा */
        .phone-shell { 
            background: #000; border-radius: 40px; padding: 10px; 
            border: 4px solid #222; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            overflow: hidden; /* ताकि कंटेंट बाहर न निकले */
        }

        /* TOP BROWSER BAR (Notch के साथ) */
        .browser-header {
            height: 55px; background: #1a1a1a; width: 100%;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            position: relative; z-index: 10; border-bottom: 1px solid #333;
        }
        .notch {
            width: 80px; height: 18px; background: #000; margin: 0 auto;
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
        }

        /* IFRAME CONTAINER */
        .viewport {
            width: 100%; height: 100%; background: #fff;
            position: relative; overflow: hidden;
        }

        iframe { 
            border: none; width: 100%; height: 100%; 
            display: block; background: white;
        }

        /* STRICT BOTTOM NAV (यह कंटेंट को कवर करेगा) */
        .browser-footer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 65px; /* असली मोबाइल नेविगेशन की हाइट */
            background: #1a1a1a; /* सॉलिड कलर ताकि पीछे का बटन छुप जाए */
            z-index: 100; /* सबसे ऊपर */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-top: 1px solid #333;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }
        .home-indicator { width: 100px; height: 4px; background: #555; border-radius: 10px; margin-top: 15px; }

        /* Control Panel */
        .control-panel { 
            width: 350px; background: #0f111a; border-radius: 25px; 
            padding: 20px; border: 1px solid #ff3b3b;
        }
        .panel-header { color: #ff3b3b; text-align: center; font-size: 1.3rem; margin-bottom: 20px; font-weight: 800; }
        .url-row { background: #1a1d29; border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .url-input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; font-size: 12px; margin-bottom: 10px; }
        .dim-inputs { display: flex; gap: 8px; }
        .dim-inputs input { width: 50%; padding: 10px; background: #000; border: 1px solid #444; color: #00ffcc; border-radius: 8px; text-align: center; }
        
        button { cursor: pointer; border: none; transition: 0.2s; font-weight: bold; border-radius: 8px; }
        .apply-btn { background: #00ffcc; color: #000; width: 100%; padding: 12px; margin-top: 10px; font-size: 12px; }
        .add-btn { background: #ff3b3b; color: white; width: 100%; padding: 15px; margin-top: 10px; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ff3b3b; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="emulator-grid" id="grid"></div>
    
    <div class="control-panel">
        <h1 class="panel-header">⚡ MATRIX STRICT V10</h1>
        <div id="list"></div>
        <button class="add-btn" onclick="add()">➕ ADD NEW DEVICE</button>
    </div>
</div>

<script>
    let devices = JSON.parse(localStorage.getItem('matrix_v10')) || [
        { id: Date.now(), url: 'https://imagex-ten.vercel.app/', w: 360, h: 740 }
    ];

    function render() {
        localStorage.setItem('matrix_v10', JSON.stringify(devices));
        const grid = document.getElementById('grid');
        const list = document.getElementById('list');
        grid.innerHTML = ''; list.innerHTML = '';

        devices.forEach(d => {
            // Create Device
            const shell = document.createElement('div');
            shell.className = 'phone-shell';
            shell.style.width = (d.w + 20) + 'px';
            shell.style.height = (d.h + 20) + 'px';
            shell.innerHTML = `
                <div class="browser-header"><div class="notch"></div></div>
                <div class="viewport">
                    <iframe src="${d.url}"></iframe>
                    <div class="browser-footer">
                        <div style="display:flex; gap:20px; opacity:0.5; font-size:10px;"><span>◄</span><span>●</span><span>■</span></div>
                        <div class="home-indicator"></div>
                    </div>
                </div>
            `;
            grid.appendChild(shell);

            // Create Controls
            const row = document.createElement('div');
            row.className = 'url-row';
            row.innerHTML = `
                <input class="url-input" id="url-${d.id}" value="${d.url}">
                <div class="dim-inputs">
                    <input type="number" id="w-${d.id}" value="${d.w}">
                    <input type="number" id="h-${d.id}" value="${d.h}">
                </div>
                <button class="apply-btn" onclick="update(${d.id})">Update & Kill Visibility</button>
            `;
            list.appendChild(row);
        });
    }

    function update(id) {
        const d = devices.find(x => x.id === id);
        d.url = document.getElementById(`url-${id}`).value;
        d.w = parseInt(document.getElementById(`w-${id}`).value);
        d.h = parseInt(document.getElementById(`h-${id}`).value);
        render();
    }

    function add() {
        devices.push({ id: Date.now(), url: '', w: 360, h: 740 });
        render();
    }

    window.onload = render;
</script>
</body>
</html>
